<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よしきへの質問フォーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #F5F0E8;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .app { max-width: 480px; margin: 0 auto; }
  .logo-area { text-align: center; margin-bottom: 2rem; }
  .logo-icon {
    width: 56px; height: 56px; margin: 0 auto 12px;
    background: #C8B99A; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 28px; height: 28px; }
  .logo-title { font-size: 17px; font-weight: 600; color: #3D2E1E; letter-spacing: 0.01em; }
  .logo-sub { font-size: 13px; color: #7A6A56; margin-top: 4px; }
  .card {
    background: #fff;
    border: 1px solid #E0D5C5;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-label { font-size: 13px; color: #7A6A56; margin-bottom: 10px; }
  textarea {
    width: 100%; min-height: 120px;
    border: 1px solid #D0C4B0;
    border-radius: 10px;
    padding: 12px; font-size: 15px;
    font-family: inherit;
    color: #3D2E1E;
    background: #FAF7F2;
    resize: none; line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #A89070; }
  textarea::placeholder { color: #B0A090; }
  .char-count { font-size: 12px; color: #B0A090; text-align: right; margin-top: 6px; }
  .divider { height: 1px; background: #EDE5D8; margin: 1rem 0; }
  .hint { font-size: 13px; color: #7A6A56; line-height: 1.6; }
  .submit-btn {
    width: 100%; padding: 14px;
    background: #8B6F47; color: #FAF7F2;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { background: #7A6040; }
  .submit-btn:disabled { background: #D0C4B0; cursor: not-allowed; }
  .recent-section { margin-top: 1.5rem; }
  .section-title { font-size: 13px; color: #7A6A56; margin-bottom: 4px; font-weight: 600; }
  .section-sub { font-size: 11px; color: #B0A090; margin-bottom: 10px; }
  .q-item {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid #E0D5C5;
    border-left: 3px solid #A8C5A0;
  }
  .q-label { font-size: 11px; color: #7A6A56; font-weight: 600; margin-bottom: 4px; }
  .q-text { font-size: 14px; color: #3D2E1E; line-height: 1.7; word-break: break-all; }
  .a-divider { height: 1px; background: #EDE5D8; margin: 10px 0; }
  .a-label { font-size: 11px; color: #3B6D11; font-weight: 600; margin-bottom: 4px; }
  .a-text { font-size: 14px; color: #2A4A20; line-height: 1.7; word-break: break-all; }
  .q-time { font-size: 11px; color: #B0A090; margin-top: 8px; }
  .empty-msg { font-size: 13px; color: #B0A090; text-align: center; padding: 1.5rem 0; }
  .success-state { text-align: center; padding: 2rem 1rem; }
  .success-icon {
    width: 56px; height: 56px; margin: 0 auto 16px;
    background: #E8DFD0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .success-title { font-size: 17px; font-weight: 600; color: #3D2E1E; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: #7A6A56; line-height: 1.6; }
  .back-btn {
    margin-top: 1.5rem; font-size: 14px; color: #8B6F47;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="app">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="11" r="6" stroke="#FAF7F2" stroke-width="1.5"/>
        <path d="M5 24c0-4.4 4-8 9-8s9 3.6 9 8" stroke="#FAF7F2" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-title">よしきへの質問フォーム</div>
    <div class="logo-sub">なんでも気軽に聞いてください</div>
  </div>

  <div id="form-view">
    <div class="card">
      <div class="card-label">質問・相談内容</div>
      <textarea id="q-input" placeholder="ビジネスのこと、プライベートのこと、ネットショップのこと、人生のことなど オールジャンル なんでも質問OKです！" maxlength="300" oninput="updateCount()"></textarea>
      <div class="char-count"><span id="char-num">0</span> / 300</div>
      <div class="divider"></div>
      <div class="hint">名前の入力は不要です。匿名で送信されます。</div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitQuestion()" disabled>送信する</button>

    <div class="recent-section">
      <div class="section-title">最近届いた質問</div>
      <div class="section-sub">回答済みの質問を表示しています</div>
      <div id="q-list"><div class="empty-msg">読み込み中...</div></div>
    </div>
  </div>

  <div id="success-view" style="display:none;">
    <div class="success-state">
      <div class="success-icon">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M6 14l6 6L22 8" stroke="#8B6F47" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-title">送信しました</div>
      <div class="success-sub">よしきが確認して、オープンチャットでお答えします。しばらくお待ちください。</div>
      <button class="back-btn" onclick="resetForm()">← もう一つ質問する</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwfEQz_rwzxYGu85xuTTecPYvwb76Je3Hg1RkUrGbejH7JPNxZfqQ1tO2n4Hctp7BDMEg/exec';

function updateCount() {
  var val = document.getElementById('q-input').value;
  document.getElementById('char-num').textContent = val.length;
  document.getElementById('submit-btn').disabled = val.trim().length === 0;
}

function submitQuestion() {
  var val = document.getElementById('q-input').value.trim();
  if (!val) return;
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  var url = GAS_URL + '?question=' + encodeURIComponent(val);
  var img = new Image();
  img.src = url;

  setTimeout(function() {
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
    setTimeout(loadQuestions, 2000);
  }, 1500);
}

function resetForm() {
  document.getElementById('q-input').value = '';
  document.getElementById('char-num').textContent = '0';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = '送信する';
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('success-view').style.display = 'none';
}

function timeAgo(dateStr) {
  var now = new Date();
  var d = new Date(dateStr);
  if (isNaN(d)) return '';
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff / 60) + '分前';
  if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
  return Math.floor(diff / 86400) + '日前';
}

function escapeHtml(text) {
  return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function loadQuestions() {
  fetch(GAS_URL)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var list = document.getElementById('q-list');
      var answered = (data || []).filter(function(q) {
        return q.status === '回答済み';
      });
      if (answered.length === 0) {
        list.innerHTML = '<div class="empty-msg">まだ回答済みの質問はありません</div>';
        return;
      }
      var recent = answered.slice(-5).reverse();
      list.innerHTML = recent.map(function(q) {
        var answerHtml = '';
        if (q.answer) {
          answerHtml = '<div class="a-divider"></div>' +
            '<div class="a-label">よしきの回答</div>' +
            '<div class="a-text">' + escapeHtml(q.answer) + '</div>';
        }
        return '<div class="q-item">' +
          '<div class="q-label">質問</div>' +
          '<div class="q-text">' + escapeHtml(q.question) + '</div>' +
          answerHtml +
          '<div class="q-time">' + timeAgo(q.time) + '</div>' +
          '</div>';
      }).join('');
    })
    .catch(function() {
      document.getElementById('q-list').innerHTML = '<div class="empty-msg">読み込みに失敗しました</div>';
    });
}

loadQuestions();
</script>
</body>
</html>
