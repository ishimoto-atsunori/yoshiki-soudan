<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面｜よしきの相談室</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #F5F0E8; min-height: 100vh; padding: 1.25rem 1rem; }
  .header { max-width: 900px; margin: 0 auto 1.25rem; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 16px; font-weight: 600; color: #3D2E1E; }
  .header-sub { font-size: 12px; color: #7A6A56; margin-top: 2px; }
  .stats { max-width: 900px; margin: 0 auto 1.25rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 0.875rem 0.5rem; text-align: center; border: 1px solid #E0D5C5; }
  .stat-num { font-size: 26px; font-weight: 600; color: #3D2E1E; }
  .stat-label { font-size: 11px; color: #7A6A56; margin-top: 3px; }
  .filters { max-width: 900px; margin: 0 auto 1rem; display: flex; gap: 8px; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #D0C4B0; background: #fff; font-size: 13px; color: #7A6A56; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { background: #8B6F47; color: #FAF7F2; border-color: #8B6F47; }

  /* グリッド：スマホ1列、タブレット2列、PC3列 */
  .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 860px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .q-card { background: #fff; border-radius: 14px; padding: 1rem; border: 1px solid #E0D5C5; border-left: 4px solid #C8B99A; display: flex; flex-direction: column; }
  .q-card.answered { border-left-color: #A8C5A0; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; margin-bottom: 8px; }
  .badge.answered { background: #EAF3DE; color: #3B6D11; }
  .badge.unanswered { background: #FFF3E0; color: #8B5E00; }
  .q-text { font-size: 14px; color: #3D2E1E; line-height: 1.7; word-break: break-all; margin-bottom: 6px; flex: 1; }
  .q-time { font-size: 11px; color: #B0A090; margin-bottom: 10px; }
  .divider { height: 1px; background: #EDE5D8; margin: 8px 0; }
  .draft-box { background: #F5F0E8; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid #C8B99A; }
  .draft-label { font-size: 10px; color: #8B6F47; font-weight: 600; margin-bottom: 4px; }
  .draft-text { font-size: 12px; color: #5A4A3A; line-height: 1.6; word-break: break-all; }
  .answer-box { background: #EAF3DE; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid #A8C5A0; }
  .answer-label { font-size: 10px; color: #3B6D11; font-weight: 600; margin-bottom: 4px; }
  .answer-text { font-size: 12px; color: #2A4A20; line-height: 1.6; word-break: break-all; }
  .answer-input-area { margin-bottom: 8px; }
  .answer-input-label { font-size: 11px; color: #7A6A56; margin-bottom: 4px; font-weight: 600; }
  textarea.answer-input { width: 100%; min-height: 70px; border: 1px solid #D0C4B0; border-radius: 8px; padding: 8px; font-size: 12px; font-family: inherit; color: #3D2E1E; background: #FAF7F2; resize: none; line-height: 1.6; outline: none; }
  textarea.answer-input:focus { border-color: #A89070; }
  .card-actions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: auto; }
  .action-btn { padding: 8px 10px; border-radius: 8px; border: 1px solid #D0C4B0; background: #FAF7F2; font-size: 11px; color: #7A6A56; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .action-btn.primary { background: #8B6F47; color: #FAF7F2; border-color: #8B6F47; }
  .action-btn.success { background: #3B6D11; color: #FAF7F2; border-color: #3B6D11; }
  .action-btn.draft-copy { background: #F0EBE3; color: #8B6F47; border-color: #D0C4B0; }
  .action-btn.danger { background: #fff; color: #C0392B; border-color: #E0C4C0; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .reload-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #D0C4B0; background: #fff; font-size: 13px; color: #7A6A56; cursor: pointer; font-family: inherit; }
  .empty { text-align: center; padding: 3rem 1rem; color: #B0A090; font-size: 14px; grid-column: 1/-1; }
  .loading { text-align: center; padding: 3rem 1rem; color: #B0A090; font-size: 14px; grid-column: 1/-1; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #3D2E1E; color: #FAF7F2; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; z-index: 100; white-space: nowrap; }
  .confirm-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 200; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: #fff; border-radius: 16px; padding: 1.5rem; max-width: 320px; width: 90%; text-align: center; }
  .confirm-title { font-size: 16px; font-weight: 600; color: #3D2E1E; margin-bottom: 8px; }
  .confirm-sub { font-size: 13px; color: #7A6A56; margin-bottom: 1.5rem; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 8px; }
  .confirm-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 600; }
  .confirm-btn.cancel { background: #F5F0E8; color: #7A6A56; }
  .confirm-btn.delete { background: #C0392B; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">管理画面｜よしきの相談室</div>
    <div class="header-sub">質問の確認・ステータス管理</div>
  </div>
  <button class="reload-btn" onclick="loadQuestions()">更新</button>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" id="total-count">-</div><div class="stat-label">合計</div></div>
  <div class="stat-card"><div class="stat-num" id="unanswered-count" style="color:#8B5E00;">-</div><div class="stat-label">未回答</div></div>
  <div class="stat-card"><div class="stat-num" id="answered-count" style="color:#3B6D11;">-</div><div class="stat-label">回答済み</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('unanswered', this)">未回答</button>
  <button class="filter-btn" onclick="setFilter('answered', this)">回答済み</button>
</div>

<div class="grid" id="q-grid"><div class="loading">読み込み中...</div></div>
<div class="toast" id="toast"></div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">質問を削除しますか？</div>
    <div class="confirm-sub" id="confirm-text"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-btn delete" onclick="executeDelete()">削除する</button>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwfEQz_rwzxYGu85xuTTecPYvwb76Je3Hg1RkUrGbejH7JPNxZfqQ1tO2n4Hctp7BDMEg/exec';
var allData = [];
var currentFilter = 'all';
var pendingDeleteRow = null;
var pendingDeleteIdx = null;

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderCards();
}

function timeAgo(dateStr) {
  var now = new Date();
  var d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff / 60) + '分前';
  if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
  return Math.floor(diff / 86400) + '日前';
}

function escapeHtml(text) {
  return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function gasRequest(params, callback) {
  var url = GAS_URL + '?' + params;
  var img = new Image();
  img.onload = function() { if (callback) callback(); };
  img.onerror = function() { if (callback) callback(); };
  img.src = url;
}

function saveAnswer(row, idx) {
  var textarea = document.getElementById('answer-input-' + idx);
  if (!textarea) return;
  var answer = textarea.value.trim();
  if (!answer) { showToast('回答を入力してください'); return; }
  var btn = document.getElementById('save-btn-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
  gasRequest('action=saveAnswer&row=' + row + '&answer=' + encodeURIComponent(answer), function() {
    allData[idx].answer = answer;
    allData[idx].status = '回答済み';
    renderCards();
    showToast('回答を保存しました');
  });
}

function toggleStatus(row, idx) {
  var current = allData[idx].status;
  var newStatus = (current === '回答済み') ? '未回答' : '回答済み';
  gasRequest('action=updateStatus&row=' + row + '&status=' + encodeURIComponent(newStatus), function() {
    allData[idx].status = newStatus;
    renderCards();
    showToast(newStatus === '回答済み' ? '回答済みにしました' : '未回答に戻しました');
  });
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('コピーしました'); });
  } else {
    var el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('コピーしました');
  }
}

function confirmDelete(row, idx, questionText) {
  pendingDeleteRow = row;
  pendingDeleteIdx = idx;
  document.getElementById('confirm-text').textContent = questionText.length > 40 ? questionText.slice(0, 40) + '...' : questionText;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  pendingDeleteRow = null;
  pendingDeleteIdx = null;
}

function executeDelete() {
  if (pendingDeleteRow === null) return;
  var row = pendingDeleteRow;
  var idx = pendingDeleteIdx;
  closeConfirm();
  gasRequest('action=delete&row=' + row, function() {
    allData.splice(idx, 1);
    renderCards();
    showToast('削除しました');
  });
}

function renderCards() {
  var grid = document.getElementById('q-grid');
  var filtered = allData.filter(function(q) {
    if (currentFilter === 'unanswered') return q.status !== '回答済み';
    if (currentFilter === 'answered') return q.status === '回答済み';
    return true;
  });

  var unanswered = allData.filter(function(q) { return q.status !== '回答済み'; }).length;
  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('unanswered-count').textContent = unanswered;
  document.getElementById('answered-count').textContent = allData.length - unanswered;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">該当する質問はありません</div>';
    return;
  }

  grid.innerHTML = filtered.map(function(q) {
    var idx = allData.indexOf(q);
    var isAnswered = q.status === '回答済み';

    var draftHtml = q.draft
      ? '<div class="draft-box"><div class="draft-label">💡 AIたたき台</div><div class="draft-text">' + escapeHtml(q.draft) + '</div></div>'
      : '';

    var answerHtml = '';
    if (isAnswered && q.answer) {
      answerHtml = '<div class="answer-box"><div class="answer-label">✅ よしきの回答</div><div class="answer-text">' + escapeHtml(q.answer) + '</div></div>';
    } else if (!isAnswered) {
      answerHtml = '<div class="answer-input-area">'
        + '<div class="answer-input-label">最終回答を入力（オプチャ投稿と同じ内容をコピペ）</div>'
        + '<textarea class="answer-input" id="answer-input-' + idx + '" placeholder="よしきさんが実際に投稿した回答をここに貼り付けてください...">' + (q.answer || '') + '</textarea>'
        + '</div>';
    }

    return '<div class="q-card ' + (isAnswered ? 'answered' : '') + '">'
      + '<div class="badge ' + (isAnswered ? 'answered' : 'unanswered') + '">' + q.status + '</div>'
      + '<div class="q-text">' + escapeHtml(q.question) + '</div>'
      + '<div class="q-time">' + timeAgo(q.time) + '</div>'
      + '<div class="divider"></div>'
      + draftHtml
      + answerHtml
      + '<div class="card-actions">'
        + '<button class="action-btn" onclick="copyText(allData[' + idx + '].question)">質問コピー</button>'
        + (q.draft ? '<button class="action-btn draft-copy" onclick="copyText(allData[' + idx + '].draft)">たたき台コピー</button>' : '')
        + (!isAnswered ? '<button class="action-btn success" id="save-btn-' + idx + '" onclick="saveAnswer(' + q.row + ', ' + idx + ')">回答を保存する</button>' : '')
        + '<button class="action-btn primary" onclick="toggleStatus(' + q.row + ', ' + idx + ')">' + (isAnswered ? '未回答に戻す' : '回答済みにする') + '</button>'
        + '<button class="action-btn danger" onclick="confirmDelete(' + q.row + ', ' + idx + ', allData[' + idx + '].question)">削除</button>'
      + '</div>'
    + '</div>';
  }).join('');
}

function loadQuestions() {
  document.getElementById('q-grid').innerHTML = '<div class="loading">読み込み中...</div>';
  fetch(GAS_URL)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allData = data || [];
      renderCards();
    })
    .catch(function() {
      document.getElementById('q-grid').innerHTML = '<div class="empty">読み込みに失敗しました。更新ボタンを押してください。</div>';
    });
}

loadQuestions();
</script>
</body>
</html>
